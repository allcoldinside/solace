services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: solace
      POSTGRES_PASSWORD: solace
      POSTGRES_DB: solace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solace"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  worker:
    build: .
    env_file: .env
    depends_on:
      - redis
      - postgres
    command: celery -A tasks.celery_app.celery_app worker -Q default,low --loglevel=INFO
    volumes:
      - .:/app

volumes:
  postgres_data:
