version: '3.9'

services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://solace:solace@db:5432/solace}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-solace}
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./:/app

  worker:
    build: .
    command: celery -A tasks.celery_app.celery_app worker -Q default,low,high,critical -l info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://solace:solace@db:5432/solace}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - db
      - redis

  beat:
    build: .
    command: celery -A tasks.celery_app.celery_app beat -l info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://solace:solace@db:5432/solace}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-solace}
      POSTGRES_USER: ${POSTGRES_USER:-solace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solace}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
