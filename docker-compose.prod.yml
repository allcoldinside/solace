services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-solace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-solace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build: .
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker-default:
    build: .
    env_file: .env
    depends_on:
      - redis
      - postgres
    command: celery -A tasks.celery_app.celery_app worker -Q default,low --loglevel=INFO
    restart: unless-stopped

  worker-high:
    build: .
    env_file: .env
    depends_on:
      - redis
      - postgres
    command: celery -A tasks.celery_app.celery_app worker -Q high,critical --loglevel=INFO
    restart: unless-stopped

volumes:
  postgres_data:
